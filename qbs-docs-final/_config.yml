title: QBS Documentation
description: Official user documentation for QBS ERP — Accounting, Bank/Cash, Setup, and more.
baseurl: "/qbs-docs"
url: ""

remote_theme: just-the-docs/just-the-docs
color_scheme: default

aux_links:
  "QBS Login":
    - "https://qbs-test.qfl.com.bd"
aux_links_new_tab: true

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

footer_content: "Copyright &copy; 2026 QBS. All rights reserved."
back_to_top: true
back_to_top_text: "Back to top"
heading_anchors: true
nav_sort: order

callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

exclude:
  - "*.gemspec"
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
